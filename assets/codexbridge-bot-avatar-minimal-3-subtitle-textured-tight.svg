<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="120" x2="904" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111C34"/>
      <stop offset="1" stop-color="#0A1326"/>
    </linearGradient>

    <pattern id="gridTexture" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#8AA3C7" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>

    <filter id="noise" x="0" y="0" width="1" height="1" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="17" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
    </filter>

    <linearGradient id="stripe" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="24" y="24" width="976" height="976" rx="232" fill="url(#bg)"/>
  <rect x="24" y="24" width="976" height="976" rx="232" stroke="#26354F" stroke-width="2"/>

  <!-- Texture layers -->
  <rect x="24" y="24" width="976" height="976" rx="232" fill="url(#gridTexture)"/>
  <rect x="24" y="24" width="976" height="976" rx="232" filter="url(#noise)"/>
  <path d="M24 240L1000 820" stroke="url(#stripe)" stroke-width="140"/>
  <path d="M24 820L1000 260" stroke="url(#stripe)" stroke-width="90"/>

  <path d="M256 276H768" stroke="#22D3EE" stroke-width="12" stroke-linecap="round" opacity="0.95"/>
  <path d="M256 702H768" stroke="#22D3EE" stroke-width="12" stroke-linecap="round" opacity="0.95"/>

  <text x="512" y="528" text-anchor="middle" fill="#F8FAFC"
        font-family="SF Pro Display, PingFang SC, Helvetica Neue, Arial, sans-serif"
        font-size="290" font-weight="700" letter-spacing="6">CB</text>

  <text x="512" y="828" text-anchor="middle" fill="#E2E8F0"
        font-family="SF Pro Text, PingFang SC, Helvetica Neue, Arial, sans-serif"
        font-size="58" font-weight="600" letter-spacing="1.2">CodeX Telegram</text>
</svg>
